<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="Akshay Aravind" />
    <meta name="description" content="Personal portfolio and travel photography gallery highlighting cloud architecture projects and wilderness exploration." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://akshayaravind.com/photos" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <title>Akshay Aravind</title>
    <style>
      .prose {
        max-width: 65ch;
        margin-left: auto;
        margin-right: auto;
      }

      .text-center {
        text-align: center;
      }
    </style>
    <script>
      ;(function () {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        const setting = localStorage.getItem('vueuse-color-scheme') || 'auto'
        if (setting === 'dark' || (prefersDark && setting !== 'light'))
          document.documentElement.classList.toggle('dark', true)
      })()
    </script>
  </head>
  <body class="font-sans text-gray-700 dark:text-gray-200 relative">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
