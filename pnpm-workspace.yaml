allowBuilds:
  esbuild: true
  exifreader: true
  sharp: true
  simple-git-hooks: true

catalogMode: prefer
minimumReleaseAgeExclude:
  - '@iconify/json@2.2.478'
  - unplugin-vue-markdown@32.0.0

shellEmulator: true
trustPolicy: no-downgrade
packages: []
catalogs:
  build:
    '@shikijs/markdown-it': ^4.1.0
    '@shikijs/transformers': ^4.1.0
    '@shikijs/twoslash': ^4.1.0
    '@unocss/preset-web-fonts': ^66.7.0
    '@vitejs/plugin-vue': ^6.0.7
    gray-matter: ^4.0.3
    markdown-it: ^14.1.1
    markdown-it-anchor: ^9.2.0
    markdown-it-github-alerts: ^1.0.1
    markdown-it-link-attributes: ^4.0.1
    markdown-it-magic-link: ^0.1.4
    markdown-it-table-of-contents: ^1.2.0
    unocss: ^66.7.0
    unplugin-auto-import: ^21.0.0
    unplugin-vue-components: ^32.1.0
    unplugin-vue-markdown: ^32.0.0
    vite: ^8.0.14
    vite-ssg: ^28.3.0
  dev:
    '@antfu/eslint-config': ^9.0.0
    '@iconify/json': ^2.2.478
    ansis: ^4.3.0
    diacritics: ^1.3.0
    eslint: ^10.4.0
    eslint-plugin-format: ^2.0.1
    fast-glob: ^3.3.3
    fs-extra: ^11.3.5
    lint-staged: ^17.0.5
    pathe: ^2.0.3
    pnpm: ^11.2.2
    rimraf: ^6.1.3
    tsx: ^4.22.3
    typescript: ~6.0.3
  frontend:
    '@antfu/utils': ^9.3.0
    '@unhead/vue': ^3.1.0
    '@unocss/reset': ^66.7.0
    '@unpic/placeholder': ^0.1.2
    '@vueuse/core': ^14.3.0
    dayjs: ^1.11.20
    pixi.js: ^8.18.1
    shiki: ^4.1.0
    simplex-noise: ^4.0.3
    vue: ^3.5.34
    vue-router: ^5.0.7
  types:
    '@types/diacritics': ^1.3.3
    '@types/fs-extra': ^11.0.4
    '@types/markdown-it': ^14.1.2
    '@types/markdown-it-link-attributes': ^3.0.5
    '@types/node': ^25.9.1
onlyBuiltDependencies:
  - canvas
  - esbuild
  - exifreader
  - sharp
  - simple-git-hooks
  - unrs-resolver
